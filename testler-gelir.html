<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaliTablo — Gelir & Gider Takibi</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:     #0a1520;
  --bg2:    #0f1e2e;
  --surface:#0f1e2e;
  --surface2:#132438;
  --border: rgba(251,191,36,.1);
  --border2:rgba(251,191,36,.18);
  --text:   #e8f4ff;
  --muted:  #6a9ab8;
  --green:  #86efac;
  --red:    #fca5a5;
  --income: #4ade80;
  --kdv-red:#f87171;
  --kdv-green:#4ade80;
  --purple: #fbbf24;
  --blue:   #fcd34d;
  --grad:linear-gradient(135deg,#ca8a04,#d97706,#92400e);
  --grad-income: linear-gradient(135deg,#fbbf24,#d97706);
  --grad-expense:linear-gradient(135deg,#f97316,#fcd34d);
  --grad-amber:  linear-gradient(135deg,#e6a817,#c47d0e);
  --grad-gold:   linear-gradient(135deg,#ffd93d,#ff9f1c);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:0 0 60px;
}

/* ── HEADER ── */
header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:18px 24px 0;
  position:sticky;top:0;z-index:100;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px;}
.hdr-top .logo{position:static;transform:none;}
.logo{font-family:'Libre Baskerville',serif;font-weight:800;font-size:22px;letter-spacing:-.5px;}
.logo span{background:var(--grad-income);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo em{font-style:normal;color:var(--muted);font-weight:400;font-size:13px;margin-left:8px;}

/* filtre şeridi */
.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.filter-bar select,.filter-bar button{
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);border-radius:9px;padding:7px 13px;
  font-family:'Nunito',sans-serif;font-size:13px;cursor:pointer;
  transition:border-color .2s;
}
.filter-bar select:focus,.filter-bar button:focus{outline:none;border-color:var(--purple);}
.filter-bar select:hover,.filter-bar button:hover{border-color:var(--border2);}
.filter-bar .btn-reset{
  background:transparent;color:var(--muted);border:1px solid var(--border);
  font-size:12px;padding:7px 12px;
}
.filter-bar .btn-reset:hover{color:var(--text);border-color:var(--border2);}

  /* ── GELİR VERGİSİ ── */
  .vergi-wrap{display:flex;flex-direction:column;gap:28px;}
  .vergi-yil-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(146,64,14,.08));border:1px solid rgba(251,191,36,.25);border-radius:16px;padding:18px 22px;margin-bottom:12px;}
  .vergi-yil-sol{display:flex;align-items:center;gap:14px;}
  .vergi-yil-rozet{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#ca8a04,#92400e);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .vergi-yil-ad{font-family:'Libre Baskerville',serif;font-size:20px;font-weight:700;color:var(--text);}
  .vergi-yil-alt{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.5px;}
  .vergi-yil-sag{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
  .vergi-yil-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
  .vergi-yil-stat-val{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;}
  .vergi-efektif{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:10px;padding:8px 14px;text-align:center;}
  .vergi-efektif-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .vergi-efektif-val{font-size:18px;font-weight:800;color:#fbbf24;}
  .vergi-tablo-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px;}
  .vergi-tablo-hdr{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr 1fr 0.8fr 1.2fr;background:rgba(251,191,36,.07);border-bottom:2px solid rgba(251,191,36,.2);}
  .vergi-tablo-hdr span{padding:11px 14px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
  .vergi-tablo-hdr span:not(:last-child){border-right:1px solid var(--border);}
  .vergi-tablo-satir{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr 1fr 0.8fr 1.2fr;border-bottom:1px solid var(--border);transition:background .15s;}
  .vergi-tablo-satir:last-child{border-bottom:none;}
  .vergi-tablo-satir:hover{background:rgba(255,255,255,.03);}
  .vergi-bos{opacity:.4;}
  .vtd{padding:14px 14px;font-size:13px;display:flex;align-items:center;}
  .vtd:not(:last-child){border-right:1px solid rgba(255,255,255,.04);}
  .vtd-donem{flex-direction:column;align-items:flex-start;gap:2px;}
  .vtd-donem-no{font-family:'Libre Baskerville',serif;font-size:14px;font-weight:700;color:var(--text);}
  .vtd-donem-ay{font-size:10px;color:var(--muted);}
  .vergi-dilim-badge{font-size:12px;font-weight:800;padding:4px 10px;border-radius:8px;background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
  .vtd-vergi{flex-direction:column;align-items:flex-end;gap:3px;}
  .vtd-vergi-val{font-family:'Libre Baskerville',serif;font-size:16px;font-weight:700;color:#f87171;}
  .vtd-vergi-yok{font-size:13px;color:var(--muted);}
  .vtd-vergi-lbl{font-size:10px;color:var(--muted);}
  .vergi-tablo-toplam{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr 1fr 0.8fr 1.2fr;background:rgba(251,191,36,.06);border-top:2px solid rgba(251,191,36,.25);}
  .vergi-tablo-toplam .vtd{padding:16px 14px;}
  .vergi-tablo-toplam .vtd:not(:last-child){border-right:1px solid rgba(251,191,36,.1);}
  .vergi-dilim-tablo{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .vergi-dilim-tablo-hdr{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);}
  .vergi-dilim-tablo-hdr span{padding:9px 14px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
  .vergi-dilim-satir{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-bottom:1px solid var(--border);}
  .vergi-dilim-satir:last-child{border-bottom:none;}
  .vergi-dilim-satir.aktif-dilim{background:rgba(251,191,36,.07);border-left:3px solid #fbbf24;}
  .vergi-dilim-satir span{padding:10px 14px;font-size:12px;font-weight:600;}
  @media(max-width:700px){.vergi-tablo-hdr,.vergi-tablo-satir,.vergi-tablo-toplam{grid-template-columns:1fr 1fr;}.vergi-yil-sag{flex-wrap:wrap;}}

/* ALT SEKMELER */
.sub-tabs{display:flex;gap:6px;margin:18px 0 14px;justify-content:center;flex-wrap:wrap;}
.stb{font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;}
.stb:hover{color:var(--text);border-color:var(--muted);}
.stb.active{background:var(--surface);color:var(--text);border-color:var(--a2, #fbbf24);box-shadow:0 0 0 1px rgba(251,191,36,.2);}
.ay-chip{font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;}
.ay-chip:hover{color:var(--text);}
.ay-chip.active{background:rgba(251,191,36,.12);color:var(--text);border-color:rgba(251,191,36,.4);}

/* sekmeler */
.tabs{display:flex;gap:4px;margin-top:12px;justify-content:center;}
.tb{
  padding:10px 20px;border-radius:10px 10px 0 0;
  font-family:'Nunito',sans-serif;font-weight:600;font-size:13px;
  border:1px solid transparent;border-bottom:none;
  cursor:pointer;background:transparent;color:var(--muted);
  transition:all .18s;
}
.tb:hover{color:var(--text);background:var(--surface);}
.tb.active{background:var(--surface);color:var(--text);border-color:var(--border);}

/* ── ANA İÇERİK ── */
.wrap{max-width:960px;margin:0 auto;padding:24px 20px 0;}

.tab{display:none;}
.tab.active{display:block;}
#ozet-period-title{text-align:center;justify-content:center;width:100%;}

/* ── ÖZET KARTLARI ── */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px;}
.scard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;
}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.scard.income::before{background:var(--grad-gold);}
.scard.expense::before{background:var(--grad-amber);}
.scard.net.positive::before{background:var(--grad-income);}
.scard.net.negative::before{background:var(--grad-expense);}
.scard.kdv::before{background:linear-gradient(90deg,var(--blue),var(--purple));}
.scard-lbl{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.scard-val{font-family:'Nunito',sans-serif;font-weight:800;font-size:24px;line-height:1;}
.scard.income .scard-val{background:var(--grad-gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.scard.expense .scard-val{background:var(--grad-amber);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.scard.net.positive .scard-val{color:#4ade80 !important;-webkit-text-fill-color:#4ade80 !important;}
.scard.net.negative .scard-val{color:#f87171 !important;-webkit-text-fill-color:#f87171 !important;}
.scard.kdv .scard-val{color:var(--blue);}
.scard-sub{font-size:11px;color:var(--muted);margin-top:6px;}

/* ── DÖNEM BAŞLIĞI ── */
.period-title{
  font-family:'Libre Baskerville',serif;font-weight:700;font-size:18px;
  margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:10px;text-align:center;width:100%;
}
.period-badge{
  font-size:12px;font-weight:600;color:var(--purple);
  background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);
  border-radius:6px;padding:3px 10px;
}

/* ── GİRİŞ FORMU ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;}
.ctitle{font-family:'Libre Baskerville',serif;font-weight:700;font-size:15px;margin-bottom:16px;display:flex;align-items:center;gap:9px;}
.ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ico.ig{background:rgba(61,214,140,.15);}
.ico.ir{background:rgba(255,107,107,.15);}
.ico.ib{background:rgba(76,201,240,.15);}

.form-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;align-items:end;margin-bottom:10px;}
.form-row-2{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:10px;align-items:end;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);border-radius:9px;padding:9px 12px;
  font-family:'Nunito',sans-serif;font-size:13px;
  transition:border-color .2s;width:100%;
}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--purple);}
.fg input::placeholder{color:var(--muted);}

/* butonlar */
.btn{
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);border-radius:9px;padding:9px 16px;
  font-family:'Nunito',sans-serif;font-weight:600;font-size:13px;
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.btn:hover{border-color:var(--border2);filter:brightness(1.1);}
.btn-income{background:rgba(61,214,140,.12);color:var(--income);border-color:rgba(61,214,140,.25);}
.btn-income:hover{background:rgba(52,211,153,.2);transform:translateY(-1px);box-shadow:0 6px 16px rgba(52,211,153,.15);}
.btn-expense{background:rgba(255,107,107,.12);color:var(--expense);border-color:rgba(255,107,107,.25);}
.btn-expense:hover{background:rgba(249,115,22,.2);transform:translateY(-1px);box-shadow:0 6px 16px rgba(249,115,22,.15);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-del{background:transparent;border:1px solid transparent;color:var(--muted);padding:8px 10px;border-radius:8px;}
.btn-del:hover{background:rgba(255,107,107,.1);color:var(--expense);border-color:rgba(255,107,107,.2);}

/* ── KAYIT LİSTESİ ── */
.entries-header{
  display:grid;font-size:11px;font-weight:700;color:var(--muted);
  letter-spacing:.5px;text-transform:uppercase;
  padding:6px 14px;margin-bottom:6px;
}
.entries-header.income-hdr{grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;}
.entries-header.expense-hdr{grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;}
.entry{
  display:grid;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:11px 14px;margin-bottom:7px;
  align-items:center;transition:border-color .18s;
}
.entry:hover{border-color:var(--border2);}
.entry.income-row{grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;}
.entry.expense-row{grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;background:rgba(248,113,113,.04);border-color:rgba(248,113,113,.12);}
.entry-name{font-weight:500;font-size:13px;}
.entry-name small{display:block;font-size:11px;color:var(--muted);margin-top:2px;}
.entry-val{font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;}
.entry-val.green{color:var(--income);}
.entry-val.red{color:var(--expense);}
.entry-val.muted{color:var(--muted);font-weight:500;font-size:13px;}
.entry-date{font-size:11px;color:var(--muted);}
.kdv-red-badge{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.35);border-radius:8px;font-size:12px;font-weight:800;padding:4px 10px;display:inline-block;}
.kdv-green-badge{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.35);border-radius:8px;font-size:12px;font-weight:800;padding:4px 10px;display:inline-block;}
  .badge-kdv{
  display:inline-block;background:rgba(76,201,240,.1);color:var(--blue);
  border:1px solid rgba(76,201,240,.2);border-radius:5px;
  font-size:10px;font-weight:700;padding:2px 7px;
}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state .es-icon{font-size:40px;margin-bottom:12px;}
.empty-state p{font-size:13px;}

/* ── AYLIK ÖZET TABLOSU (arşiv) ── */
.month-table{width:100%;border-collapse:separate;border-spacing:0 6px;font-size:13px;}
.month-table thead th{
  padding:6px 16px;font-size:10px;font-weight:700;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--muted);text-align:left;
}
.month-table tbody tr td{
  padding:14px 16px;
  background:var(--surface);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.month-table tbody tr td:first-child{
  border-left:1px solid var(--border);
  border-radius:12px 0 0 12px;
  border-left:3px solid rgba(251,191,36,.3);
}
.month-table tbody tr td:last-child{
  border-right:1px solid var(--border);
  border-radius:0 12px 12px 0;
}
.month-table tbody tr:hover td{background:rgba(255,255,255,.04);}
.month-table tfoot tr td{
  padding:14px 16px;
  background:rgba(251,191,36,.06);
  border-top:2px solid rgba(251,191,36,.3);
  border-bottom:1px solid rgba(251,191,36,.2);
  font-weight:800;
}
.month-table tfoot tr td:first-child{
  border-left:3px solid rgba(251,191,36,.5);
  border-radius:12px 0 0 12px;
}
.month-table tfoot tr td:last-child{
  border-right:1px solid rgba(251,191,36,.2);
  border-radius:0 12px 12px 0;
}
.month-table .mn{font-family:'Libre Baskerville',serif;font-weight:700;font-size:13px;color:var(--text);}
.month-table .pos{color:#4ade80;font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;}
.month-table .neg{color:#f87171;font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;}
.month-table .neu{color:var(--muted);}
.month-table .clickable{cursor:pointer;}
.month-table .clickable:hover .mn{color:var(--purple);text-decoration:underline;}

/* ── GRAFİK ÇUBUKLAR ── */
.bar-chart{margin-bottom:24px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{width:60px;font-size:11px;color:var(--muted);text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:28px;background:var(--surface2);border-radius:6px;overflow:hidden;display:flex;}
.bar-income{background:var(--grad-income);border-radius:6px 0 0 6px;transition:width .4s ease;}
.bar-expense{background:var(--grad-expense);border-radius:0 6px 6px 0;transition:width .4s ease;}
.bar-vals{font-family:'Nunito',sans-serif;font-size:11px;display:flex;gap:6px;width:200px;flex-shrink:0;}
.bar-val-i{color:var(--income);}
.bar-val-e{color:var(--expense);}

/* ── KDV ÖZET ── */
.kdv-box{background:rgba(76,201,240,.05);border:1px solid rgba(76,201,240,.15);border-radius:12px;padding:16px 18px;}
.kdv-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(76,201,240,.1);font-size:13px;}
.kdv-row:last-child{border-bottom:none;font-weight:700;}
.kdv-row span:last-child{font-family:'Nunito',sans-serif;font-weight:600;}

/* ── YIL SEKMELERİ (arşiv) ── */
.year-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.ytb{
  padding:7px 16px;border-radius:8px;font-size:13px;
  font-family:'Nunito',sans-serif;font-weight:600;
  cursor:pointer;background:var(--surface2);
  border:1px solid var(--border);color:var(--muted);transition:all .18s;
}
.ytb.active,.ytb:hover{background:rgba(251,191,36,.12);color:var(--purple);border-color:rgba(251,191,36,.3);}

/* ── AYLIK DETAY ── */
.month-detail-header{
  display:flex;align-items:center;gap:12px;margin-bottom:18px;
}
.back-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted);border-radius:8px;padding:6px 12px;
  font-size:12px;cursor:pointer;
}
.back-btn:hover{color:var(--text);}

/* ── TOAST ── */

  /* DÜZENLEME MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:0;width:min(480px,100%);box-shadow:0 24px 64px rgba(0,0,0,.7);overflow:hidden;}
  .modal::before{content:'';display:block;height:3px;background:var(--grad-income);}
  .modal.expense-modal::before{background:var(--grad-expense);}
  .modal-hdr{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .modal-hdr h3{font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;}
  .modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
  .modal-close:hover{color:var(--expense);}
  .modal-body{padding:20px;}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}

<script>
// ══════════════════════════════════════════
// VERİ
// ══════════════════════════════════════════
let gelirler = JSON.parse(localStorage.getItem('mt_gelir') || '[]');
let giderler = JSON.parse(localStorage.getItem('mt_gider') || '[]');

const AYLAR = ['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

// ════════════ GOOGLE SHEETS SYNC ════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwoljMq2NJUv8EWRUHil_BvnTceNOsXlLM9Mih8_jFREQRe_71U5MSyaa8a7jXMvOXw/exec';
let _syncTimer = null;
let _syncQueue = {};
let _syncing   = false;

function syncDurum(tip, mesaj) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLbl');
  if(!dot || !lbl) return;
  const renkler = {ok:'#3dd68c', hata:'#ff6b6b', bekle:'#ffd93d', mesgul:'#4d96ff'};
  dot.style.background = renkler[tip] || '#7878a0';
  lbl.textContent = mesaj;
}

function syncYaz(key, value) {
  localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
  _syncQueue[key] = value;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncGonder, 1500);
  syncDurum('bekle', 'Kaydediliyor...');
}

async function syncGonder() { syncDurum("ok","💾 Yerel"); }

async function syncYukle() { syncDurum("ok","💾 Yerel"); }

function kaydetGelir(){ syncYaz('mt_gelir', gelirler); }
function kaydetGider(){ syncYaz('mt_gider', giderler); }

// ── YARDIMCI ──
function fmt(n){ return (Math.round(n*100)/100).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function escH(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function bugunTarih(){ return new Date().toISOString().split('T')[0]; }

function kdvHesapla(tutar, kdvOrani){
  // Tutar KDV DAHİL girilirse → kdvHariç ve kdv tutarı
  const kdvH = tutar / (1 + kdvOrani/100);
  const kdvT = tutar - kdvH;
  return { dahil: tutar, hariç: kdvH, kdvT };
}

function tarihParse(t){ const p=t.split('-'); return {yil:parseInt(p[0]),ay:parseInt(p[1]),gun:parseInt(p[2])}; }
function tarihStr(t){ const p=tarihParse(t); return `${p.gun} ${AYLAR[p.ay]} ${p.yil}`; }

// ── FİLTRE ──
function getFilter(){ return { yil: parseInt(document.getElementById('filterYil').value)||0, ay: parseInt(document.getElementById('filterAy').value)||0 }; }
function filtrele(liste){
  const f=getFilter();
  return liste.filter(e=>{
    const p=tarihParse(e.tarih);
    if(f.yil && p.yil !== f.yil) return false;
    if(f.ay  && p.ay  !== f.ay)  return false;
    return true;
  });
}

// ── YILLAR DROPDOWN ──
function yillariGuncelle(){
  const yillar = new Set();
  [...gelirler,...giderler].forEach(e=>{ if(e.tarih) yillar.add(tarihParse(e.tarih).yil); });
  const sel = document.getElementById('filterYil');
  const mevcut = sel.value;
  sel.innerHTML = '<option value="">Tüm Yıllar</option>';
  [...yillar].sort((a,b)=>b-a).forEach(y=>{
    sel.innerHTML += `<option value="${y}">${y}</option>`;
  });
  sel.value = mevcut;
}

// ══════════════════════════════════════════
// SEKME GEÇİŞİ
// ══════════════════════════════════════════

function swSub(tab, el){
  window._subTab = tab;
  document.querySelectorAll('.stb').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  // Aylık seçici göster/gizle
  const aySecici = document.getElementById('aySecici');
  if(tab === 'aylik'){
    renderAyChips();
    aySecici.style.display = 'flex';
  } else {
    aySecici.style.display = 'none';
  }
  renderOzet();
}

function renderAyChips(){
  const aySecici = document.getElementById('aySecici');
  const secili = window._seciliAylar || new Set();
  let html = '<span style="font-size:12px;color:var(--muted);align-self:center;margin-right:4px;">Ay seçin:</span>';
  for(let i=1;i<=12;i++){
    const ak = secili.has(i) ? 'active' : '';
    html += `<button class="ay-chip ${ak}" onclick="toggleAy(${i})">${AYLAR[i]}</button>`;
  }
  aySecici.innerHTML = html;
}

function toggleAy(ay){
  if(!window._seciliAylar) window._seciliAylar = new Set();
  if(window._seciliAylar.has(ay)) window._seciliAylar.delete(ay);
  else window._seciliAylar.add(ay);
  renderAyChips();
  renderOzet();
}

function renderGenelTablo(){
  // Tüm kayıtlar — yıl bazında gelir/gider/net özeti
  const yillar = new Set();
  [...gelirler,...giderler].forEach(e=>yillar.add(tarihParse(e.tarih).yil));
  if(!yillar.size) return '';
  const siralı = [...yillar].sort((a,b)=>b-a);

  let rows = siralı.map(y=>{
    const gY = gelirler.filter(e=>tarihParse(e.tarih).yil===y).reduce((s,e)=>s+e.dahil,0);
    const dY = giderler.filter(e=>tarihParse(e.tarih).yil===y).reduce((s,e)=>s+e.dahil,0);
    const gelirKdv = gelirler.filter(e=>tarihParse(e.tarih).yil===y).reduce((s,e)=>s+e.kdvT,0);
    const giderKdv = giderler.filter(e=>tarihParse(e.tarih).yil===y).reduce((s,e)=>s+e.kdvT,0);
    const kdvOdenecek = gelirKdv - giderKdv;
    const netG = gY - dY - (kdvOdenecek > 0 ? kdvOdenecek : 0);
    const netClass = netG>=0?'pos':'neg';
    return `<tr>
      <td><span class="mn">${y}</span></td>
      <td><span class="pos">${fmt(gY)} ₺</span></td>
      <td><span class="neg">${fmt(dY)} ₺</span></td>
      <td><span class="${netClass}">${netG>=0?'+':''}${fmt(netG)} ₺</span></td>
    </tr>`;
  }).join('');

  // Genel toplam satırı
  const topG = gelirler.reduce((s,e)=>s+e.dahil,0);
  const topD = giderler.reduce((s,e)=>s+e.dahil,0);
  const topKdvG = gelirler.reduce((s,e)=>s+e.kdvT,0);
  const topKdvD = giderler.reduce((s,e)=>s+e.kdvT,0);
  const topKdv = topKdvG - topKdvD;
  const topNet = topG - topD - (topKdv>0?topKdv:0);
  const topClass = topNet>=0?'pos':'neg';

  return `<div class="card" style="margin-top:18px;">
    <div class="ctitle"><div class="ico ig">📋</div>Genel Tablo</div>
    <table class="month-table">
      <thead><tr><th>Yıl</th><th>Toplam Gelir</th><th>Toplam Gider</th><th>Net Kâr</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr style="border-top:2px solid var(--border);font-weight:700;">
        <td><span class="mn">TOPLAM</span></td>
        <td><span class="pos">${fmt(topG)} ₺</span></td>
        <td><span class="neg">${fmt(topD)} ₺</span></td>
        <td><span class="${topClass}">${topNet>=0?'+':''}${fmt(topNet)} ₺</span></td>
      </tr></tfoot>
    </table>
  </div>`;
}

function renderAylikSecimli(){
  const secili = window._seciliAylar || new Set();
  if(!secili.size){
    return `<div class="card" style="margin-top:18px;"><div class="empty-state"><div class="es-icon">📅</div><p>Yukarıdan görüntülemek istediğiniz ayları seçin.</p></div></div>`;
  }

  const yillar = new Set();
  [...gelirler,...giderler].forEach(e=>yillar.add(tarihParse(e.tarih).yil));
  const siralıYillar = [...yillar].sort((a,b)=>b-a);
  const siralıAylar = [...secili].sort((a,b)=>a-b);

  let rows = '';
  siralıYillar.forEach(y=>{
    siralıAylar.forEach(ay=>{
      const gA = gelirler.filter(e=>{const p=tarihParse(e.tarih);return p.yil===y&&p.ay===ay;}).reduce((s,e)=>s+e.dahil,0);
      const dA = giderler.filter(e=>{const p=tarihParse(e.tarih);return p.yil===y&&p.ay===ay;}).reduce((s,e)=>s+e.dahil,0);
      if(gA===0&&dA===0) return;
      const net = gA - dA;
      const netClass = net>=0?'pos':'neg';
      rows += `<tr>
        <td><span class="mn">${AYLAR[ay]} ${y}</span></td>
        <td><span class="pos">${fmt(gA)} ₺</span></td>
        <td><span class="neg">${fmt(dA)} ₺</span></td>
        <td><span class="${netClass}">${net>=0?'+':''}${fmt(net)} ₺</span></td>
      </tr>`;
    });
  });

  if(!rows) return `<div class="card" style="margin-top:18px;"><div class="empty-state"><div class="es-icon">📅</div><p>Seçili aylarda kayıt bulunamadı.</p></div></div>`;

  return `<div class="card" style="margin-top:18px;">
    <div class="ctitle"><div class="ico ig">📅</div>Aylık Tablo — ${siralıAylar.map(a=>AYLAR[a]).join(', ')}</div>
    <table class="month-table">
      <thead><tr><th>Dönem</th><th>Toplam Gelir</th><th>Toplam Gider</th><th>Net Kâr</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function sw(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(el) el.classList.add('active');
  if(tab==='ozet')  renderOzet();
  if(tab==='gelir') renderGelirList();
  if(tab==='gider') renderGiderList();
  if(tab==='arsiv') renderArsiv();
  if(tab==='vergi') renderVergi();
}

function filterDegisti(){
  const aktif = document.querySelector('.tab.active');
  if(!aktif) return;
  const id = aktif.id.replace('tab-','');
  sw(id, document.querySelector('.tb.active'));
}

function filtreTemizle(){
  document.getElementById('filterYil').value='';
  document.getElementById('filterAy').value='';
  filterDegisti();
}

// ══════════════════════════════════════════
// GELİR
// ══════════════════════════════════════════
function gelirEkle(){
  const ad    = document.getElementById('gelirAd').value.trim();
  const tutar = parseFloat(document.getElementById('gelirTutar').value)||0;
  const kdv   = parseInt(document.getElementById('gelirKdv').value)||0;
  const tarih = document.getElementById('gelirTarih').value || bugunTarih();
  if(!ad){ toast('⚠️ Açıklama girin.'); return; }
  if(tutar<=0){ toast('⚠️ Tutar girin.'); return; }
  const hesap = kdvHesapla(tutar, kdv);
  gelirler.push({ id: Date.now(), ad, tarih, kdvOrani:kdv, dahil:hesap.dahil, hariç:hesap.hariç, kdvT:hesap.kdvT });
  kaydetGelir();
  yillariGuncelle();
  document.getElementById('gelirAd').value='';
  document.getElementById('gelirTutar').value='';
  renderGelirList();
  renderOzetIfActive();
  toast('✅ Gelir eklendi.');
}

function gelirSil(id){
  gelirler = gelirler.filter(e=>e.id!==id);
  kaydetGelir();
  renderGelirList();
  renderOzetIfActive();
  yillariGuncelle();
  toast('🗑 Kayıt silindi.');
}

function renderGelirList(){
  const liste = filtrele(gelirler).sort((a,b)=>{
    const td = b.tarih.localeCompare(a.tarih);
    if(td !== 0) return td;
    return (b.id > a.id) ? 1 : (b.id < a.id) ? -1 : 0;
  });
  const el = document.getElementById('gelirList');
  document.getElementById('gelirCount').textContent = liste.length ? `(${liste.length} kayıt)` : '';
  if(!liste.length){
    el.innerHTML=`<div class="empty-state"><div class="es-icon">📈</div><p>Henüz gelir kaydı yok.<br>Yukarıdan ekleyin.</p></div>`;
    return;
  }
  el.innerHTML = liste.map(e=>`
    <div class="entry income-row">
      <div class="entry-name">${escH(e.ad)} ${e.kdvOrani>0?`<span class="badge-kdv">%${e.kdvOrani} KDV</span>`:''}</div>
      <div class="entry-date">${tarihStr(e.tarih)}</div>
      <div class="entry-val green">${fmt(e.hariç)} ₺</div>
      <div class="entry-val muted">${e.kdvT>0?fmt(e.kdvT)+' ₺':'—'}</div>
      <div class="entry-val green">${fmt(e.dahil)} ₺</div>
      <div style="display:flex;gap:5px;">
        <button class="btn-edit" onclick="modalAc('gelir',${e.id})">✏️</button>

function giderEkle(){
  const ad    = document.getElementById('giderAd').value.trim();
  const tutar = parseFloat(document.getElementById('giderTutar').value)||0;
  const kdv   = parseInt(document.getElementById('giderKdv').value)||0;
  const tarih = document.getElementById('giderTarih').value || bugunTarih();
  if(!ad){ toast('⚠️ Açıklama girin.'); return; }
  if(tutar<=0){ toast('⚠️ Tutar girin.'); return; }
  const hesap = kdvHesapla(tutar, kdv);
  giderler.push({ id: Date.now(), ad, tarih, kdvOrani:kdv, dahil:hesap.dahil, hariç:hesap.hariç, kdvT:hesap.kdvT });
  kaydetGider();
  yillariGuncelle();
  document.getElementById('giderAd').value='';
  document.getElementById('giderTutar').value='';
  renderGiderList();
  renderOzetIfActive();
  toast('✅ Gider eklendi.');
}

function giderSil(id){
  giderler = giderler.filter(e=>e.id!==id);
  kaydetGider();
  renderGiderList();
  renderOzetIfActive();
  yillariGuncelle();
  toast('🗑 Kayıt silindi.');
}

function renderGiderList(){
  const liste = filtrele(giderler).sort((a,b)=>{
    const td = b.tarih.localeCompare(a.tarih);
    if(td !== 0) return td;
    return (b.id > a.id) ? 1 : (b.id < a.id) ? -1 : 0;
  });
  const el = document.getElementById('giderList');
  document.getElementById('giderCount').textContent = liste.length ? `(${liste.length} kayıt)` : '';
  if(!liste.length){
    el.innerHTML=`<div class="empty-state"><div class="es-icon">📉</div><p>Henüz gider kaydı yok.<br>Yukarıdan ekleyin.</p></div>`;
    return;
  }
  el.innerHTML = liste.map(e=>`
    <div class="entry expense-row">
      <div class="entry-name">${escH(e.ad)} ${e.kdvOrani>0?`<span class="badge-kdv">%${e.kdvOrani} KDV</span>`:''}</div>
      <div class="entry-date">${tarihStr(e.tarih)}</div>
      <div class="entry-val red">${fmt(e.hariç)} ₺</div>
      <div class="entry-val red" style="opacity:.7">${e.kdvT>0?fmt(e.kdvT)+' ₺':'—'}</div>
      <div class="entry-val red">${fmt(e.dahil)} ₺</div>
      <div style="display:flex;gap:5px;">
        <button class="btn-edit" onclick="modalAc('gider',${e.id})">✏️</button>
        <button class="btn btn-del btn-sm" onclick="giderSil(${e.id})">🗑</button>
      </div>
    </div>`).join('');
}

function hesaplaOzet(gelirListe, giderListe){
  const topGelirDahil = gelirListe.reduce((s,e)=>s+e.dahil,0);
  const topGelirHariç = gelirListe.reduce((s,e)=>s+e.hariç,0);
  const topGelirKdv   = gelirListe.reduce((s,e)=>s+e.kdvT,0);
  const topGiderDahil = giderListe.reduce((s,e)=>s+e.dahil,0);
  const topGiderHariç = giderListe.reduce((s,e)=>s+e.hariç,0);
  const topGiderKdv   = giderListe.reduce((s,e)=>s+e.kdvT,0);
  const netKar        = topGelirDahil - topGiderDahil; // KDV dahil gelir - gider
  const kdvOdenmesi   = topGelirKdv - topGiderKdv; // pozitifse ödenecek, negatifse iade
  // Net kâr: KDV dahil gelir-gider farkı, ödenecek KDV varsa ayrıca düşülür, iade eklenmez
  const netGercek     = kdvOdenmesi > 0 ? netKar - kdvOdenmesi : netKar;
  return { topGelirDahil, topGelirHariç, topGelirKdv, topGiderDahil, topGiderHariç, topGiderKdv, netKar, netGercek, kdvOdenmesi };
}

// ── YILLIK GRAFİK: tüm yıllar özeti ──
function renderYillikGrafik(){
  const yillar = new Set();
  [...gelirler,...giderler].forEach(e=>yillar.add(tarihParse(e.tarih).yil));
  if(!yillar.size) return '';
  const siralı = [...yillar].sort((a,b)=>b-a);
  const maxVal = Math.max(...siralı.map(y=>{
    const gY = gelirler.filter(e=>tarihParse(e.tarih).yil===y).reduce((s,e)=>s+e.dahil,0);
    const dY = giderler.filter(e=>tarihParse(e.tarih).yil===y).reduce((s,e)=>s+e.dahil,0);
    return Math.max(gY,dY);
  })) || 1;

  let rows = siralı.map(y=>{
    const gY = gelirler.filter(e=>tarihParse(e.tarih).yil===y).reduce((s,e)=>s+e.dahil,0);
    const dY = giderler.filter(e=>tarihParse(e.tarih).yil===y).reduce((s,e)=>s+e.dahil,0);
    const gYhariç  = gelirler.filter(e=>tarihParse(e.tarih).yil===y).reduce((s,e)=>s+e.hariç,0);
    const dYhariç  = giderler.filter(e=>tarihParse(e.tarih).yil===y).reduce((s,e)=>s+e.hariç,0);
    const gelirKdv = gelirler.filter(e=>tarihParse(e.tarih).yil===y).reduce((s,e)=>s+e.kdvT,0);
    const giderKdv = giderler.filter(e=>tarihParse(e.tarih).yil===y).reduce((s,e)=>s+e.kdvT,0);
    const kdvOdenecek = gelirKdv - giderKdv; // pozitifse devlete ödenir
    const net  = gY - dY;
    const netG = gY - dY - (kdvOdenecek > 0 ? kdvOdenecek : 0);
    const netClass = netG>=0?'pos':'neg';
    return `<tr class="clickable" onclick="yilSec(${y})">
      <td><span class="mn">${y}</span></td>
      <td><span class="pos">${fmt(gY)} ₺</span></td>
      <td><span class="neg">${fmt(dY)} ₺</span></td>
      <td><span class="${netClass}">${netG>=0?'+':''}${fmt(netG)} ₺</span></td>
    </tr>`;
  }).join('');

  return `<div class="card" style="margin-top:18px;">
    <div class="ctitle"><div class="ico ig">📊</div>Yıllık Özet <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:6px;">— yıla tıklayarak detaya gidin</span></div>
    <table class="month-table">
      <thead><tr><th>Yıl</th><th>Toplam Gelir</th><th>Toplam Gider</th><th>Net Kâr</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── AYLIK GRAFİK: bir yılın 12 ayı ──
function renderAylikGrafik(yil){
  let rows='', maxVal=0;
  for(let ay=1;ay<=12;ay++){
    const gA = gelirler.filter(e=>{const p=tarihParse(e.tarih);return p.yil===yil&&p.ay===ay;}).reduce((s,e)=>s+e.dahil,0);
    const dA = giderler.filter(e=>{const p=tarihParse(e.tarih);return p.yil===yil&&p.ay===ay;}).reduce((s,e)=>s+e.dahil,0);
    maxVal = Math.max(maxVal,gA,dA);
  }
  if(!maxVal) return '';

  for(let ay=1;ay<=12;ay++){
    const gA = gelirler.filter(e=>{const p=tarihParse(e.tarih);return p.yil===yil&&p.ay===ay;}).reduce((s,e)=>s+e.dahil,0);
    const dA = giderler.filter(e=>{const p=tarihParse(e.tarih);return p.yil===yil&&p.ay===ay;}).reduce((s,e)=>s+e.dahil,0);
    const gelirKdvA = gelirler.filter(e=>{const p=tarihParse(e.tarih);return p.yil===yil&&p.ay===ay;}).reduce((s,e)=>s+e.kdvT,0);
    const giderKdvA = giderler.filter(e=>{const p=tarihParse(e.tarih);return p.yil===yil&&p.ay===ay;}).reduce((s,e)=>s+e.kdvT,0);
    const kdvDA = gelirKdvA - giderKdvA;
    const net = gA-dA;
    const netG = net;
    const netClass = netG>=0?'pos':'neg';
    if(gA===0&&dA===0) continue;
    rows+=`<tr class="clickable" onclick="ayAyarla(${ay})">
      <td><span class="mn">${AYLAR[ay]}</span></td>
      <td><span class="pos">${fmt(gA)} ₺</span></td>
      <td><span class="neg">${fmt(dA)} ₺</span></td>
      <td><span class="${netClass}">${netG>=0?'+':''}${fmt(netG)} ₺</span></td>
    </tr>`;
  }
  if(!rows) return '';
  return `<div class="card" style="margin-top:18px;">
    <div class="ctitle"><div class="ico ig">📅</div>${yil} Aylık Özet <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:6px;">— aya tıklayarak detaya gidin</span></div>
    <table class="month-table">
      <thead><tr><th>Ay</th><th>Toplam Gelir</th><th>Toplam Gider</th><th>Net Kâr</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

  document.getElementById('filterAy').value  = '';

function ayAyarla(ay){
  document.getElementById('filterAy').value = ay;

// GELİR VERGİSİ
// ══════════════════════════════════════════
const VERGI_DILIMLERI_2026 = [
  { limit: 198000,    oran: 0.15, onceki: 0,        oncekiVergi: 0        },
  { limit: 480000,    oran: 0.20, onceki: 198000,   oncekiVergi: 29700    },
  { limit: 1300000,   oran: 0.27, onceki: 480000,   oncekiVergi: 86100    },
  { limit: 5400000,   oran: 0.35, onceki: 1300000,  oncekiVergi: 307500   },
  { limit: Infinity,  oran: 0.40, onceki: 5400000,  oncekiVergi: 1742500  },
];

function gelirVergisiHesapla(netKar) {
  if(netKar <= 0) return 0;
  for(const d of VERGI_DILIMLERI_2026) {
    if(netKar <= d.limit) {
      return d.oncekiVergi + (netKar - d.onceki) * d.oran;
    }
  }
  return 0;
}

function vergiBilgi(netKar) {
  if(netKar <= 0) return { oran: 0, dilim: '—' };
  for(const d of VERGI_DILIMLERI_2026) {
    if(netKar <= d.limit) {
      return { oran: d.oran, dilim: `%${(d.oran*100).toFixed(0)}` };
    }
  }
  return { oran: 0.40, dilim: '%40' };
}

function netKarHesapla(gL, gD) {
  const topG = gL.reduce((s,e)=>s+e.dahil,0);
  const topD = gD.reduce((s,e)=>s+e.dahil,0);
  const topKdvG = gL.reduce((s,e)=>s+e.kdvT,0);
  const topKdvD = gD.reduce((s,e)=>s+e.kdvT,0);
  const kdvOdenecek = topKdvG - topKdvD;
  return topG - topD - (kdvOdenecek > 0 ? kdvOdenecek : 0);
}

function renderVergi() {
  const el = document.getElementById('vergiIcerik');
  const yillar = new Set();
  [...gelirler,...giderler].forEach(e=>yillar.add(tarihParse(e.tarih).yil));
  const siralıYillar = [...yillar].sort((a,b)=>b-a);

  if(!siralıYillar.length) {
    el.innerHTML = `<div class="card"><div class="empty-state"><div class="es-icon">💰</div><p>Henüz kayıt yok.</p></div></div>`;
    return;
  }

  const DONEMLER = [
    { no:1, label:'1. Dönem', aylar:[1,2,3],  aciklama:'Oca – Şub – Mar' },
    { no:2, label:'2. Dönem', aylar:[4,5,6],  aciklama:'Nis – May – Haz' },
    { no:3, label:'3. Dönem', aylar:[7,8,9],  aciklama:'Tem – Ağu – Eyl' },
    { no:4, label:'4. Dönem', aylar:[10,11,12],aciklama:'Eki – Kas – Ara' },
  ];

  const DILIMLER = [
    { limit:'198.000 ₺',    oran:'%15', onceki:'—',           oncekiVergi:'—'           },
    { limit:'480.000 ₺',    oran:'%20', onceki:'198.000 ₺',   oncekiVergi:'29.700 ₺'    },
    { limit:'1.300.000 ₺',  oran:'%27', onceki:'480.000 ₺',   oncekiVergi:'86.100 ₺'    },
    { limit:'5.400.000 ₺',  oran:'%35', onceki:'1.300.000 ₺', oncekiVergi:'307.500 ₺'   },
    { limit:'Üzeri',        oran:'%40', onceki:'5.400.000 ₺', oncekiVergi:'1.742.500 ₺' },
  ];

  let html = '<div class="vergi-wrap">';

  siralıYillar.forEach(yil => {
    let toplamNetKar = 0;
    let toplamVergiOdendi = 0;

    // Tüm dönem verilerini hesapla
    const donemler = DONEMLER.map(d => {
      const gL = gelirler.filter(e=>{ const p=tarihParse(e.tarih); return p.yil===yil && d.aylar.includes(p.ay); });
      const gD = giderler.filter(e=>{ const p=tarihParse(e.tarih); return p.yil===yil && d.aylar.includes(p.ay); });
      const donemNet    = netKarHesapla(gL, gD);
      const donemGelir  = gL.reduce((s,e)=>s+e.dahil,0);
      const donemGider  = gD.reduce((s,e)=>s+e.dahil,0);
      toplamNetKar += donemNet;
      const kumulatifVergi  = gelirVergisiHesapla(toplamNetKar);
      const buDonemVergi    = Math.max(0, kumulatifVergi - toplamVergiOdendi);
      toplamVergiOdendi    += buDonemVergi;
      const bilgi = vergiBilgi(toplamNetKar);
      const veri  = gL.length + gD.length > 0;
      return { ...d, donemNet, donemGelir, donemGider, toplamNetKar, kumulatifVergi, buDonemVergi, bilgi, veri };
    });

    const yToplamNet   = netKarHesapla(
      gelirler.filter(e=>tarihParse(e.tarih).yil===yil),
      giderler.filter(e=>tarihParse(e.tarih).yil===yil)
    );
    const yToplamVergi = gelirVergisiHesapla(yToplamNet);
    const efektif      = yToplamNet > 0 ? (yToplamVergi/yToplamNet*100).toFixed(1) : '0';
    const aktifDilim   = VERGI_DILIMLERI_2026.findIndex(d=>yToplamNet<=d.limit);

    // Tablo satırları
    const satirlar = donemler.map(d => `
      <div class="vergi-tablo-satir ${!d.veri?'vergi-bos':''}">
        <div class="vtd vtd-donem">
          <span class="vtd-donem-no">${d.label}</span>
          <span class="vtd-donem-ay">${d.aciklama}</span>
        </div>
        <div class="vtd" style="color:#4ade80;font-weight:700;font-size:14px;">${fmt(d.donemGelir)} ₺</div>
        <div class="vtd" style="color:#f87171;font-weight:700;font-size:14px;">${fmt(d.donemGider)} ₺</div>
        <div class="vtd" style="color:${d.donemNet>=0?'#4ade80':'#f87171'};font-weight:700;font-size:14px;">${d.donemNet>=0?'+':''}${fmt(d.donemNet)} ₺</div>
        <div class="vtd" style="color:var(--muted);font-size:13px;">${fmt(d.toplamNetKar)} ₺</div>
        <div class="vtd"><span class="vergi-dilim-badge">${d.bilgi.dilim}</span></div>
        <div class="vtd vtd-vergi">
          ${d.buDonemVergi>0
            ? `<span class="vtd-vergi-val">${fmt(d.buDonemVergi)} ₺</span><span class="vtd-vergi-lbl">Bu dönem ödenecek</span>`
            : `<span class="vtd-vergi-yok">—</span>`
          }
        </div>
      </div>`
    ).join('');

    // Dilim referans tablosu
    const dilimSatirlari = DILIMLER.map((d,i) => `

    html += `

      <div class="vergi-yil-header">
        <div class="vergi-yil-sol">
          <div class="vergi-yil-rozet">💰</div>
          <div>
            <div class="vergi-yil-ad">${yil} Yılı Gelir Vergisi</div>
            <div class="vergi-yil-alt">Kümülatif hesaplama · 2026 dilimleri · 3 aylık dönemler</div>
          </div>
        </div>
        <div class="vergi-yil-sag">
          <div class="vergi-yil-stat">
            <div class="vergi-yil-stat-lbl">Yıllık Net Kâr</div>
            <div class="vergi-yil-stat-val" style="color:${yToplamNet>=0?'#4ade80':'#f87171'}">${yToplamNet>=0?'+':''}${fmt(yToplamNet)} ₺</div>
          </div>
          <div class="vergi-yil-stat">
            <div class="vergi-yil-stat-lbl">Toplam Vergi</div>
            <div class="vergi-yil-stat-val" style="color:#f87171">${fmt(yToplamVergi)} ₺</div>
          </div>
          <div class="vergi-efektif">
            <div class="vergi-efektif-lbl">Efektif Oran</div>
            <div class="vergi-efektif-val">%${efektif}</div>
          </div>
        </div>
      </div>

      <!-- Ana dönem tablosu -->
      <div class="vergi-tablo-wrap">
        <div class="vergi-tablo-hdr">
          <span>Dönem</span>
          <span>Gelir (KDV Dahil)</span>
          <span>Gider (KDV Dahil)</span>
          <span>Dönem Net Kâr</span>
          <span>Kümülatif Kâr</span>
          <span>Vergi Dilimi</span>
          <span>Ödenecek Vergi</span>
        </div>
        ${satirlar}
        <!-- Toplam satırı -->
        <div class="vergi-tablo-toplam">
          <div class="vtd" style="font-family:'Libre Baskerville',serif;font-weight:700;color:var(--text);">YILLIK TOPLAM</div>
          <div class="vtd" style="color:#4ade80;font-weight:800;font-size:15px;">${fmt(gelirler.filter(e=>tarihParse(e.tarih).yil===yil).reduce((s,e)=>s+e.dahil,0))} ₺</div>
          <div class="vtd" style="color:#f87171;font-weight:800;font-size:15px;">${fmt(giderler.filter(e=>tarihParse(e.tarih).yil===yil).reduce((s,e)=>s+e.dahil,0))} ₺</div>
          <div class="vtd" style="color:${yToplamNet>=0?'#4ade80':'#f87171'};font-weight:800;font-size:15px;">${yToplamNet>=0?'+':''}${fmt(yToplamNet)} ₺</div>
          <div class="vtd" style="color:var(--muted);">—</div>
          <div class="vtd"><span class="vergi-dilim-badge">${vergiBilgi(yToplamNet).dilim}</span></div>
          <div class="vtd vtd-vergi">
            <span class="vtd-vergi-val" style="font-size:18px;">${fmt(yToplamVergi)} ₺</span>
            <span class="vtd-vergi-lbl">Yıllık toplam</span>
          </div>
        </div>
      </div>

      <!-- Vergi dilimleri referans tablosu -->
      <div class="vergi-dilim-tablo">
        <div class="vergi-dilim-tablo-hdr">
          <span>Gelir Sınırı</span>
          <span>Vergi Oranı</span>
          <span>Önceki Sınır</span>
          <span>Sabit Vergi Tutarı</span>
        </div>
        ${dilimSatirlari}
      </div>
    </div>`;
  });

  html += '</div>';
  el.innerHTML = html;
}


function renderArsiv(){
  const yillar = new Set();
  [...gelirler,...giderler].forEach(e=>yillar.add(tarihParse(e.tarih).yil));
  const siralı = [...yillar].sort((a,b)=>b-a);
  const el = document.getElementById('arsivIcerik');

  if(!siralı.length){
    el.innerHTML=`<div class="empty-state"><div class="es-icon">🗂</div><p>Henüz kayıt yok.</p></div>`;
    return;
  }

  let html = '<div class="card">';
  html += '<div class="ctitle"><div class="ico ib">🗂</div>Yıllık Arşiv</div>';

  siralı.forEach(yil=>{
    html += `<div style="margin-bottom:24px;">
      <div style="font-family:'Libre Baskerville',serif;font-weight:700;font-size:16px;margin-bottom:12px;color:var(--purple);">📅 ${yil}</div>
      <table class="month-table">
        <thead><tr><th>Ay</th><th>Gelir (KDV Hariç)</th><th>Gider (KDV Hariç)</th><th>Net Kâr</th><th>KDV Durumu</th></tr></thead>
        <tbody>`;

    let yTopGelir=0, yTopGider=0, yTopKdv=0;
    let ayVarMi = false;
    for(let ay=1;ay<=12;ay++){
      const gA  = gelirler.filter(e=>{const p=tarihParse(e.tarih);return p.yil===yil&&p.ay===ay;});
      const dA  = giderler.filter(e=>{const p=tarihParse(e.tarih);return p.yil===yil&&p.ay===ay;});
      if(!gA.length&&!dA.length) continue;
      ayVarMi=true;
      const oz = hesaplaOzet(gA,dA);
      yTopGelir+=oz.topGelirDahil;
      yTopGider+=oz.topGiderDahil;
      yTopKdv  +=oz.kdvOdenmesi;
      const netClass = oz.netGercek>=0?'pos':'neg';
      const kdvClass = oz.kdvOdenmesi>0?'kdv-red-badge':oz.kdvOdenmesi<0?'kdv-green-badge':'pos';
      html+=`<tr class="clickable" onclick="arsivAyGit(${yil},${ay})">
        <td><span class="mn">${AYLAR[ay]}</span></td>
        <td><span class="pos">${fmt(oz.topGelirHariç)} ₺</span></td>
        <td><span class="neg">${fmt(oz.topGiderHariç)} ₺</span></td>
        <td><span class="${netClass}">${oz.netGercek>=0?'+':''}${fmt(oz.netGercek)} ₺</span></td>
        <td><span class="${kdvClass} badge-kdv">${oz.kdvOdenmesi>0?'−':oz.kdvOdenmesi<0?'+':''} ${fmt(Math.abs(oz.kdvOdenmesi))} ₺ (${oz.kdvOdenmesi>0?'Ödenecek':'İade'})</span></td>
      </tr>`;
    }
    if(ayVarMi){
      const yNet  = yTopGelir - yTopGider;
      const yNetG = yTopKdv > 0 ? yNet - yTopKdv : yNet;
      html+=`<tr style="border-top:2px solid var(--border2);">
        <td><strong style="font-family:'Nunito',sans-serif;">Yıl Toplamı</strong></td>
        <td><strong class="pos">${fmt(yTopGelir)} ₺</strong></td>
        <td><strong class="neg">${fmt(yTopGider)} ₺</strong></td>
        <td><strong class="${yNetG>=0?'pos':'neg'}">${yNetG>=0?'+':''}${fmt(yNetG)} ₺</strong></td>
        <td></td>
      </tr>`;
    }
    html += '</tbody></table></div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function arsivAyGit(yil, ay){
  document.getElementById('filterYil').value = yil;
  document.getElementById('filterAy').value  = ay;
  sw('ozet', document.querySelector('.tb'));
  document.querySelector('.tb').classList.add('active');
}


// ══════════════════════════════════════════
// DÜZENLEME MODAL
// ══════════════════════════════════════════
let _editTip = null; // 'gelir' | 'gider'
let _editId  = null;

function modalAc(tip, id){
  const liste = tip==='gelir' ? gelirler : giderler;
  const e = liste.find(x=>x.id===id);
  if(!e) return;
  _editTip = tip; _editId = id;
  document.getElementById('editModalBaslik').textContent = tip==='gelir' ? '📈 Geliri Düzenle' : '📉 Gideri Düzenle';
  document.getElementById('editModalBox').className = 'modal' + (tip==='gider' ? ' expense-modal' : '');
  document.getElementById('editAd').value    = e.ad;
  document.getElementById('editTutar').value = e.dahil;
  document.getElementById('editKdv').value   = e.kdvOrani;
  document.getElementById('editTarih').value = e.tarih;
  document.getElementById('editModal').style.display = 'flex';
}

function modalKapat(){
  document.getElementById('editModal').style.display = 'none';
  _editTip = null; _editId = null;
}

function modalDisTikla(e){
  if(e.target === document.getElementById('editModal')) modalKapat();
}

function editKaydet(){
  const ad    = document.getElementById('editAd').value.trim();
  const tutar = parseFloat(document.getElementById('editTutar').value)||0;
  const kdv   = parseInt(document.getElementById('editKdv').value)||0;
  const tarih = document.getElementById('editTarih').value;
  if(!ad){ toast('⚠️ Açıklama girin.'); return; }
  if(tutar<=0){ toast('⚠️ Tutar girin.'); return; }
  const hesap = kdvHesapla(tutar, kdv);
  const liste = _editTip==='gelir' ? gelirler : giderler;
  const idx = liste.findIndex(x=>x.id===_editId);
  if(idx===-1){ toast('⚠️ Kayıt bulunamadı.'); return; }
  liste[idx] = { ...liste[idx], ad, tarih, kdvOrani:kdv, dahil:hesap.dahil, hariç:hesap.hariç, kdvT:hesap.kdvT };
  if(_editTip==='gelir'){ kaydetGelir(); renderGelirList(); }
  else                  { kaydetGider(); renderGiderList(); }
  yillariGuncelle();
  renderOzetIfActive();
  modalKapat();
  toast('✅ Kayıt güncellendi.');
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._to);
  t._to=setTimeout(()=>{ t.style.opacity='0'; },2800);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function init(){
  document.getElementById('gelirTarih').value = bugunTarih();
  document.getElementById('giderTarih').value = bugunTarih();
  yillariGuncelle();
  renderOzet();
  setTimeout(syncYukle, 500);
}
init();
</script>
